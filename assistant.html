<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MKAI Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}


/* En-tête */

header{
background:#000;
padding:20px;
border-bottom:1px solid #333;
display:flex;
align-items:center;
gap:10px;
}

.logo{
font-size:28px;
font-weight:bold;
color:white;
}

.logo span{
color:#00d4ff;
}


/* Zone chat */

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}


/* Messages */

.message{
max-width:80%;
padding:15px;
border-radius:18px;
margin-bottom:15px;
line-height:1.5;
}


.ai{
background:#111;
border:1px solid #333;
}


.user{
background:#fff;
color:#000;
margin-left:auto;
}



/* Zone écriture */

.input-zone{

display:flex;
padding:15px;
background:#000;
border-top:1px solid #333;

}


input{

flex:1;
padding:15px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;

}


button{

margin-left:10px;
padding:15px 25px;
border-radius:30px;
border:none;
background:white;
font-weight:bold;
cursor:pointer;

}


</style>

</head>


<body>


<header>

<div class="logo">
MK<span>AI</span> 🤖
</div>

</header>



<div id="chat">

<div class="message ai">

Bonjour 👋 Je suis MKAI Assistant.
<br><br>
Je suis conçu pour aider à apprendre, créer et développer vos projets avec l'intelligence artificielle.

</div>


</div>



<div class="input-zone">

<input id="message" placeholder="Écrivez votre question...">


<button onclick="sendMessage()">
Envoyer
</button>


</div>



<script>

function sendMessage(){

let input=document.getElementById("message");

let chat=document.getElementById("chat");


if(input.value.trim()==""){
return;
}


chat.innerHTML +=

"<div class='message user'>"+input.value+"</div>";


chat.innerHTML +=

"<div class='message ai'>MKAI analyse votre demande 🤖...</div>";


input.value="";


chat.scrollTop=chat.scrollHeight;


}

</script>


</body>

  </html>
